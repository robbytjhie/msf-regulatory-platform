name: ci-security

on:
  push:
    branches: ["main", "master"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Backend tests
        working-directory: backend
        run: mvn -B verify

  frontend-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend install
        working-directory: frontend-react
        run: npm ci

      - name: Frontend unit tests
        working-directory: frontend-react
        run: npm run test:unit -- --run

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend install and build
        working-directory: frontend-react
        run: npm ci && npm run build

  frontend-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend install
        working-directory: frontend-react
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend-react
        run: npx playwright install --with-deps chromium

      - name: Frontend e2e tests
        working-directory: frontend-react
        run: npm run test:e2e

  auth-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Auth service install
        working-directory: auth-node
        run: npm ci

  sonar-scan:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests, frontend-build, frontend-e2e, auth-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build backend classes for Sonar
        working-directory: backend
        run: mvn -B -DskipTests package

      - name: Build frontend for Sonar context
        working-directory: frontend-react
        run: npm ci && npm run build

      - name: SonarCloud Scan (push branches)
        if: github.event_name != 'pull_request'
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.projectBaseDir=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Scan (pull requests)
        if: github.event_name == 'pull_request'
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.head_ref }}
            -Dsonar.pullrequest.base=${{ github.base_ref }}
            -Dsonar.projectBaseDir=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  trivy-scan:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests, frontend-build, frontend-e2e, auth-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

  docker-build:
    runs-on: ubuntu-latest
    needs: [sonar-scan, trivy-scan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t msf/backend:ci ./backend

      - name: Build auth image
        run: docker build -t msf/auth-node:ci ./auth-node

      - name: Build frontend image
        run: docker build -t msf/frontend-react:ci ./frontend-react
