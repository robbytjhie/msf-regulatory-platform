spring.application.name=regulatory-platform

# H2 Database
spring.datasource.url=jdbc:h2:mem:regulatorydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Local document storage (MVP placeholder content saved under backend project folder)
app.storage.local.base-dir=${APP_STORAGE_LOCAL_BASE_DIR:local-documents}

# Optional document AI (metadata-only until file bytes are stored). If both are unset, verification stays simulated.
# Toggle to simulate AI outage / force manual officer validation.
app.ai.verification-enabled=${APP_AI_VERIFICATION_ENABLED:true}
# Groq: https://console.groq.com/keys — set GROQ_API_KEY or app.ai.groq.api-key
app.ai.groq.api-key=${GROQ_API_KEY:}
app.ai.groq.base-url=${GROQ_BASE_URL:https://api.groq.com}
app.ai.groq.model=${GROQ_MODEL:llama-3.1-8b-instant}
# Hugging Face Inference: https://huggingface.co/settings/tokens — set HF_API_TOKEN or app.ai.huggingface.api-token
app.ai.huggingface.inference-base-url=${HF_INFERENCE_BASE_URL:https://api-inference.huggingface.co}
app.ai.huggingface.api-token=${HF_API_TOKEN:}
app.ai.huggingface.model=${HF_MODEL:HuggingFaceTB/SmolLM2-360M-Instruct}

# JWT
app.jwt.secret=${APP_JWT_SECRET:dev-only-change-me-very-long-secret-key-2026}
app.jwt.expiration-ms=86400000

# Security hardening (IM8-aligned baseline)
# Dev defaults include any localhost port + common private LAN (Minikube / Vite --host). In production set
# APP_CORS_ALLOWED_ORIGIN_PATTERNS to exact origins (comma-separated Spring allowedOriginPatterns).
app.security.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*}
# When true, echo Origin for common dev hosts if pattern check fails (fixes Minikube tunnel ports, etc.). Set false in production if you rely only on explicit patterns.
app.security.cors.relax-private-network-origins=${APP_CORS_RELAX_PRIVATE_NETWORK:true}
app.security.login-rate-limit.max-attempts=${APP_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
app.security.login-rate-limit.window-seconds=${APP_LOGIN_RATE_LIMIT_WINDOW_SECONDS:300}

# ── Logging ──────────────────────────────────────────────────────
# Application layers — all DEBUG
logging.level.com.regulatory.platform=DEBUG
logging.level.com.regulatory.platform.security=DEBUG
logging.level.com.regulatory.platform.controller=DEBUG
logging.level.com.regulatory.platform.service=DEBUG

# Spring Security — DEBUG so we can see CORS preflight decisions
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
logging.level.org.springframework.web.cors=DEBUG

# HTTP dispatch
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# JPA / SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log pattern — thread + short class name for easy filtering
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Write to file too
logging.file.name=logs/regulatory-platform.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=5

# Server
server.port=8080
