apiVersion: v1
kind: Namespace
metadata:
  name: msf
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: msf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: msf/backend:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: msf
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-node
  namespace: msf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-node
  template:
    metadata:
      labels:
        app: auth-node
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-node
          image: msf/auth-node:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: PORT
              value: "3001"
            - name: BACKEND_URL
              value: "http://backend:8080"
          ports:
            - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: auth-node
  namespace: msf
spec:
  selector:
    app: auth-node
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-react
  namespace: msf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-react
  template:
    metadata:
      labels:
        app: frontend-react
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        # nginx master drops to worker user; drop ALL breaks startup (exit 1). Pod seccomp still applies.
        - name: frontend-react
          image: msf/frontend-react:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-react
  namespace: msf
spec:
  selector:
    app: frontend-react
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
