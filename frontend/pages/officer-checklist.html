<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Checklist — Regulatory Platform</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">On-Site Assessment Checklist</div>
      <div class="topbar-breadcrumb">
        <span style="cursor:pointer" onclick="window.location.href='/pages/officer-dashboard.html'">Dashboard</span>
        › <span id="breadcrumb-ref" style="cursor:pointer">…</span>
        › Checklist
      </div>
    </header>

    <main class="page-content">
      <div id="page-body">
        <div class="loading-overlay"><span class="spinner"></span></div>
      </div>
    </main>
  </div>
</div>

<!-- Submit confirm modal -->
<div class="modal-backdrop hidden" id="confirm-modal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <div class="modal-title">Submit Checklist</div>
      <button class="modal-close" onclick="document.getElementById('confirm-modal').classList.add('hidden')">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:14px;line-height:1.6">
        You are about to submit the site assessment checklist.<br><br>
        <strong id="confirm-summary"></strong><br><br>
        Items marked <em>Needs Clarification</em> will be surfaced to the operator.
        The application status will update automatically.
      </p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="document.getElementById('confirm-modal').classList.add('hidden')">Cancel</button>
      <button class="btn btn-primary" id="confirm-submit-btn" onclick="confirmSubmit()">Confirm & Submit</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/logger.js"></script>
<script>
const user = requireAuth('OFFICER');
const appId = new URLSearchParams(location.search).get('id');
let items = [];
let appRef = '';

if (!appId) window.location.href = '/pages/officer-dashboard.html';
if (user) init();

async function init() {
  document.getElementById('sidebar').innerHTML = renderSidebar(user, 'applications');
  document.getElementById('breadcrumb-ref').onclick = () =>
    window.location.href = `/pages/officer-application.html?id=${appId}`;

  try {
    items = await api.getChecklist(appId);
    renderChecklist();
  } catch (err) {
    document.getElementById('page-body').innerHTML =
      `<div class="alert alert-error"><div class="alert-title">Error</div>${escHtml(err.message)}</div>`;
  }
}

function renderChecklist() {
  const allPending = items.every(i => i.status === 'PENDING');
  document.getElementById('page-body').innerHTML = `
    <div class="flex-between mb-6">
      <div>
        <h1 style="font-size:20px;font-weight:700">Site Assessment</h1>
        <p class="text-muted text-sm mt-2">
          Complete all checklist items. Save as draft at any time.
          Flagged items will be sent to the operator for clarification.
        </p>
      </div>
      <div class="flex gap-3">
        <button class="btn btn-secondary" id="draft-btn" onclick="saveDraft()">
          💾 Save Draft
        </button>
        <button class="btn btn-primary" onclick="openConfirm()">
          ✓ Submit Checklist
        </button>
      </div>
    </div>

    <div class="alert alert-info mb-6">
      <div class="alert-title">ℹ Officer-only view</div>
      Operators cannot see this checklist. They will only see items you mark as
      <strong>Needs Clarification</strong>, along with your comment.
    </div>

    <!-- Progress summary -->
    <div class="card mb-6">
      <div class="card-body" style="padding:16px 20px">
        <div class="flex-between">
          <div class="flex gap-4">
            <div><span id="cnt-satisfactory" style="font-weight:700;color:var(--c-success)">0</span>
              <span class="text-muted text-sm"> Satisfactory</span></div>
            <div><span id="cnt-flagged" style="font-weight:700;color:#d4870a">0</span>
              <span class="text-muted text-sm"> Needs Clarification</span></div>
            <div><span id="cnt-pending" style="font-weight:700;color:var(--c-text-muted)">0</span>
              <span class="text-muted text-sm"> Pending</span></div>
          </div>
          <div style="font-size:12px;color:var(--c-text-muted)">
            ${items.length} items total
          </div>
        </div>
      </div>
    </div>

    <div class="checklist" id="checklist-items">
      ${items.map((item, idx) => renderItem(item, idx)).join('')}
    </div>
  `;
  updateCounts();
}

function renderItem(item, idx) {
  const isFlagged = item.status === 'NEEDS_CLARIFICATION';
  const isSatisfactory = item.status === 'SATISFACTORY';
  const isDraft = item.draftSaved;

  return `
    <div class="checklist-item ${isFlagged ? 'flagged' : isSatisfactory ? '' : ''}" id="item-card-${idx}">
      <div class="checklist-header" onclick="toggleItem(${idx})">
        <span class="checklist-code">${escHtml(item.itemCode)}</span>
        <span class="checklist-title">${escHtml(item.itemTitle)}</span>
        <div style="display:flex;align-items:center;gap:8px">
          ${item.status === 'SATISFACTORY'
            ? '<span class="badge badge-green">✓ Satisfactory</span>'
            : item.status === 'NEEDS_CLARIFICATION'
              ? '<span class="badge badge-red">⚠ Needs Clarification</span>'
              : isDraft
                ? '<span class="badge badge-gray">Draft saved</span>'
                : '<span class="badge badge-gray">Pending</span>'}
          <span id="toggle-icon-${idx}" style="color:var(--c-text-muted)">▾</span>
        </div>
      </div>

      <div class="checklist-body" id="item-body-${idx}">
        <p class="text-muted text-sm mb-4" style="line-height:1.6">
          ${escHtml(item.itemDescription || '')}
        </p>

        <div class="form-row" style="grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
          <div>
            <label>Assessment Result</label>
            <select id="status-${idx}" onchange="onStatusChange(${idx})">
              <option value="PENDING" ${item.status === 'PENDING' ? 'selected' : ''}>— Not assessed —</option>
              <option value="SATISFACTORY" ${item.status === 'SATISFACTORY' ? 'selected' : ''}>✓ Satisfactory</option>
              <option value="NEEDS_CLARIFICATION" ${item.status === 'NEEDS_CLARIFICATION' ? 'selected' : ''}>⚠ Needs Clarification</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Officer Comment ${isFlagged ? '<span class="required">*</span>' : ''}</label>
          <div class="hint">This comment will be shown to the operator if flagged for clarification.</div>
          <textarea id="comment-${idx}" rows="3"
                    placeholder="Describe the finding or issue…">${escHtml(item.officerComment || '')}</textarea>
        </div>

        ${item.operatorResponse ? `
          <div class="alert alert-success mt-2">
            <div class="alert-title">Operator Response</div>
            ${escHtml(item.operatorResponse)}
          </div>
        ` : ''}

        ${item.clarificationThreads && item.clarificationThreads.length ? `
          <div class="section-divider mt-4">Clarification Thread</div>
          <div class="comment-list">
            ${item.clarificationThreads.map(t => `
              <div class="comment-item">
                <div class="comment-meta">
                  <span class="comment-author">${escHtml(t.authorName)}</span>
                  <span class="comment-section">Round ${t.clarificationRound}</span>
                  <span class="comment-date">${fmtDate(t.createdAt)}</span>
                </div>
                <div class="comment-text">${escHtml(t.message)}</div>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

function toggleItem(idx) {
  const body = document.getElementById(`item-body-${idx}`);
  const icon = document.getElementById(`toggle-icon-${idx}`);
  const isHidden = body.style.display === 'none';
  body.style.display = isHidden ? 'block' : 'none';
  icon.textContent = isHidden ? '▾' : '▸';
}

function onStatusChange(idx) {
  const status = document.getElementById(`status-${idx}`).value;
  const card = document.getElementById(`item-card-${idx}`);
  card.className = 'checklist-item' + (status === 'NEEDS_CLARIFICATION' ? ' flagged' : '');
  updateCounts();
}

function updateCounts() {
  let sat = 0, flag = 0, pend = 0;
  items.forEach((_, idx) => {
    const status = document.getElementById(`status-${idx}`)?.value || 'PENDING';
    if (status === 'SATISFACTORY') sat++;
    else if (status === 'NEEDS_CLARIFICATION') flag++;
    else pend++;
  });
  document.getElementById('cnt-satisfactory').textContent = sat;
  document.getElementById('cnt-flagged').textContent = flag;
  document.getElementById('cnt-pending').textContent = pend;
}

function collectPayload() {
  return {
    items: items.map((item, idx) => ({
      itemId: item.id,
      status: document.getElementById(`status-${idx}`)?.value || item.status,
      officerComment: document.getElementById(`comment-${idx}`)?.value?.trim() || null,
    }))
  };
}

async function saveDraft() {
  const btn = document.getElementById('draft-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';
  try {
    await api.saveDraft(appId, collectPayload());
    toast('Draft saved successfully');
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '💾 Save Draft';
  }
}

function openConfirm() {
  const flagCount = items.filter((_, idx) =>
    document.getElementById(`status-${idx}`)?.value === 'NEEDS_CLARIFICATION'
  ).length;
  const satCount = items.filter((_, idx) =>
    document.getElementById(`status-${idx}`)?.value === 'SATISFACTORY'
  ).length;

  // Validate: all items assessed
  const pendingCount = items.filter((_, idx) =>
    document.getElementById(`status-${idx}`)?.value === 'PENDING' ||
    document.getElementById(`status-${idx}`)?.value === undefined
  ).length;

  // Validate: flagged items must have a comment
  let missingComment = false;
  items.forEach((_, idx) => {
    const status = document.getElementById(`status-${idx}`)?.value;
    const comment = document.getElementById(`comment-${idx}`)?.value?.trim();
    if (status === 'NEEDS_CLARIFICATION' && !comment) missingComment = true;
  });

  if (missingComment) {
    toast('Please add a comment for all items marked "Needs Clarification"', 'error');
    return;
  }

  document.getElementById('confirm-summary').textContent =
    `${satCount} satisfactory, ${flagCount} flagged for clarification, ${pendingCount} pending.`;
  document.getElementById('confirm-modal').classList.remove('hidden');
}

async function confirmSubmit() {
  const btn = document.getElementById('confirm-submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Submitting…';
  try {
    await api.submitChecklist(appId, collectPayload());
    toast('Checklist submitted. Application status updated.');
    setTimeout(() => window.location.href = `/pages/officer-application.html?id=${appId}`, 1200);
  } catch (err) {
    toast(err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Confirm & Submit';
  }
}
</script>
</body>
</html>
