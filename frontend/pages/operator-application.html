<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Detail — Regulatory Platform</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Application Detail</div>
      <div class="topbar-breadcrumb">
        <span style="cursor:pointer" onclick="window.location.href='/pages/operator-dashboard.html'">My Applications</span>
        › <span id="breadcrumb-ref">…</span>
      </div>
    </header>

    <main class="page-content">
      <div id="page-body">
        <div class="loading-overlay"><span class="spinner"></span></div>
      </div>
    </main>
  </div>
</div>

<!-- Resubmit Modal -->
<div class="modal-backdrop hidden" id="resubmit-modal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <div class="modal-title">Resubmit Application</div>
      <button class="modal-close" onclick="closeResubmit()">✕</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-info mb-5">
        <div class="alert-title">Update only what changed</div>
        You only need to fill in fields that have changed. Unchanged fields will retain their previous values.
      </div>
      <div class="form-group">
        <label for="rs-businessName">Business Name</label>
        <input type="text" id="rs-businessName" placeholder="Leave blank to keep existing">
      </div>
      <div class="form-group">
        <label for="rs-businessAddress">Business Address</label>
        <textarea id="rs-businessAddress" rows="2" placeholder="Leave blank to keep existing"></textarea>
      </div>
      <div class="form-group">
        <label for="rs-contactPhone">Contact Phone</label>
        <input type="tel" id="rs-contactPhone" placeholder="Leave blank to keep existing">
      </div>
      <div class="form-group">
        <label for="rs-activityDescription">Activity Description</label>
        <textarea id="rs-activityDescription" rows="4" placeholder="Leave blank to keep existing"></textarea>
      </div>

      <div class="section-divider mt-4">Upload Updated Documents</div>
      <div class="dropzone" id="rs-dropzone" onclick="document.getElementById('rs-file-input').click()">
        <div class="dropzone-icon">📄</div>
        <div class="dropzone-label">Drop updated files here</div>
        <div class="dropzone-hint">PDF, JPG, PNG — max 10MB</div>
      </div>
      <input type="file" id="rs-file-input" multiple accept=".pdf,.jpg,.jpeg,.png"
             style="display:none" onchange="onRsFileSelect(this.files)">
      <div class="file-list" id="rs-file-list" style="margin-top:12px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeResubmit()">Cancel</button>
      <button class="btn btn-primary" id="rs-submit-btn" onclick="doResubmit()">
        Submit Resubmission
      </button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/logger.js"></script>
<script>
const user = requireAuth('OPERATOR');
const appId = new URLSearchParams(location.search).get('id');
let app = null;
let rsFiles = [];

if (!appId) window.location.href = '/pages/operator-dashboard.html';
if (user) init();

async function init() {
  document.getElementById('sidebar').innerHTML = renderSidebar(user, 'dashboard');
  try {
    app = await api.getMyApplication(appId);
    document.getElementById('breadcrumb-ref').textContent = app.referenceNumber;
    document.getElementById('topbar-title').textContent = app.businessName;
    renderPage(app);
  } catch (err) {
    document.getElementById('page-body').innerHTML =
      `<div class="alert alert-error"><div class="alert-title">Error</div>${escHtml(err.message)}</div>`;
  }
}

const RESUBMIT_STATUSES = ['Pending Pre-Site Resubmission', 'Awaiting Post-Site Resubmission'];
const POST_SITE_STATUSES = ['Pending Post-Site Clarification', 'Awaiting Post-Site Resubmission',
  'Post-Site Resubmitted'];

function renderPage(app) {
  const needsResubmit = RESUBMIT_STATUSES.includes(app.statusLabel);
  const hasPostSite = POST_SITE_STATUSES.includes(app.statusLabel);
  const unresolvedComments = app.officerComments.filter(c => !c.resolved);
  const isTerminal = ['Approved','Rejected'].includes(app.statusLabel);

  document.getElementById('page-body').innerHTML = `

    <!-- Header -->
    <div class="flex-between mb-6">
      <div>
        <div class="flex-center gap-3 mb-2">
          <span class="ref-num">${escHtml(app.referenceNumber)}</span>
          ${statusBadge(app.statusLabel)}
        </div>
        <div class="text-muted text-sm">
          Submission round #${app.submissionRound} · Last updated ${fmtDate(app.lastModifiedAt)}
        </div>
      </div>
      ${needsResubmit ? `
        <button class="btn btn-primary btn-lg" onclick="openResubmit()">
          ↩ Resubmit Application
        </button>
      ` : ''}
    </div>

    <!-- Officer feedback banner -->
    ${unresolvedComments.length ? renderFeedbackBanner(unresolvedComments) : ''}

    <!-- Approval / Rejection outcome -->
    ${app.statusLabel === 'Approved' ? `
      <div class="alert alert-success mb-6">
        <div class="alert-title">🎉 Application Approved</div>
        Your licence application has been approved. You will receive official correspondence shortly.
      </div>
    ` : ''}
    ${app.statusLabel === 'Rejected' ? `
      <div class="alert alert-error mb-6">
        <div class="alert-title">Application Not Approved</div>
        Unfortunately, your application has not been approved. Please review the officer feedback below.
      </div>
    ` : ''}

    <!-- Status journey -->
    <div class="card mb-6">
      <div class="card-header"><div class="card-title">Application Status</div></div>
      <div class="card-body">
        ${renderProgressSteps(app)}
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="detail-tabs">
      <div class="tab active" data-tab="details">Details</div>
      <div class="tab" data-tab="comments">
        Officer Feedback
        ${unresolvedComments.length ? `<span class="badge badge-red" style="font-size:10px;margin-left:4px">${unresolvedComments.length}</span>` : ''}
      </div>
      <div class="tab" data-tab="documents">Documents (${app.documents.length})</div>
      ${hasPostSite ? `<div class="tab" data-tab="checklist">Site Clarification</div>` : ''}
      <div class="tab" data-tab="history">History</div>
    </div>

    <div id="tab-content"></div>
  `;

  const tabs = {
    details: renderDetailsTab,
    comments: renderCommentsTab,
    documents: renderDocsTab,
    history: renderHistoryTab,
    checklist: renderChecklistTab,
  };
  document.querySelectorAll('.tab[data-tab]').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab[data-tab]').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const fn = tabs[tab.dataset.tab];
      document.getElementById('tab-content').innerHTML = fn ? fn(app) : '';
      if (tab.dataset.tab === 'checklist') loadFlaggedItems();
    });
  });
  document.getElementById('tab-content').innerHTML = renderDetailsTab(app);
}

function renderFeedbackBanner(comments) {
  const bySec = {};
  comments.forEach(c => {
    const k = c.targetSection || 'general';
    (bySec[k] = bySec[k] || []).push(c);
  });
  return `
    <div class="alert alert-warning mb-6">
      <div class="alert-title">⚠ Officer has requested additional information — Round #${comments[0]?.submissionRound}</div>
      <div class="comment-list mt-4">
        ${comments.map(c => `
          <div style="padding:10px 12px;background:rgba(255,255,255,.6);border-radius:4px;margin-bottom:8px;border-left:3px solid #d4870a">
            ${c.targetSection ? `<div class="comment-section mb-2">${escHtml(c.targetSection)}</div>` : ''}
            <div style="font-size:13.5px">${escHtml(c.commentText)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderProgressSteps(app) {
  const steps = [
    { label: 'Submitted', statuses: ['Submitted'] },
    { label: 'Under Review', statuses: ['Under Review','Pending Pre-Site Resubmission','Pre-Site Resubmitted'] },
    { label: 'Site Visit', statuses: ['Pending Site Visit','Site Visit Done'] },
    { label: 'Post-Site', statuses: ['Pending Post-Site Clarification','Awaiting Post-Site Resubmission','Post-Site Resubmitted'] },
    { label: 'Outcome', statuses: ['Approved','Rejected'] },
  ];

  const currentIdx = steps.findIndex(s => s.statuses.includes(app.statusLabel));
  return `
    <div class="progress-steps" style="margin-bottom:0">
      ${steps.map((s, i) => `
        <div class="step ${i < currentIdx ? 'done' : i === currentIdx ? 'active' : ''}">
          <div class="step-dot">${i < currentIdx ? '✓' : i + 1}</div>
          <div class="step-label">${s.label}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderDetailsTab(app) {
  return `
    <div class="card">
      <div class="card-header"><div class="card-title">Business Information</div></div>
      <div class="detail-grid">
        <div class="detail-row"><div class="detail-label">Business Name</div><div class="detail-value">${escHtml(app.businessName)}</div></div>
        <div class="detail-row"><div class="detail-label">Business Type</div><div class="detail-value">${escHtml(app.businessType || '—')}</div></div>
        <div class="detail-row"><div class="detail-label">Address</div><div class="detail-value">${escHtml(app.businessAddress || '—')}</div></div>
        <div class="detail-row"><div class="detail-label">Contact Phone</div><div class="detail-value">${escHtml(app.contactPhone || '—')}</div></div>
        <div class="detail-row"><div class="detail-label">Submitted</div><div class="detail-value">${fmtDate(app.submittedAt)}</div></div>
      </div>
    </div>
    <div class="card mt-6">
      <div class="card-header"><div class="card-title">Activity Description</div></div>
      <div class="card-body">
        <p style="white-space:pre-wrap;line-height:1.7;font-size:14px">${escHtml(app.activityDescription || '—')}</p>
      </div>
    </div>
  `;
}

function renderCommentsTab(app) {
  if (!app.officerComments.length) return `
    <div class="card"><div class="empty-state">
      <div class="empty-state-icon">💬</div>
      <h3>No officer feedback yet</h3>
      <p>The officer will add comments here when reviewing your application.</p>
    </div></div>`;

  const byRound = {};
  app.officerComments.forEach(c => {
    (byRound[c.submissionRound] = byRound[c.submissionRound] || []).push(c);
  });

  return Object.entries(byRound).sort(([a],[b]) => b-a).map(([round, comments]) => `
    <div class="card ${parseInt(round) > 1 ? 'mt-4' : ''}">
      <div class="card-header">
        <div class="card-title">Round #${round} Officer Feedback</div>
      </div>
      <div class="card-body">
        <div class="comment-list">
          ${comments.map(c => `
            <div class="comment-item ${c.resolved ? 'resolved' : 'unresolved'}">
              <div class="comment-meta">
                ${c.targetSection ? `<span class="comment-section">${escHtml(c.targetSection)}</span>` : ''}
                ${c.resolved
                  ? '<span class="badge badge-green" style="font-size:10px">Addressed</span>'
                  : '<span class="badge badge-red" style="font-size:10px">Action needed</span>'}
                <span class="comment-date">${fmtDate(c.createdAt)}</span>
              </div>
              <div class="comment-text">${escHtml(c.commentText)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function renderDocsTab(app) {
  if (!app.documents.length) return `
    <div class="card"><div class="empty-state">
      <div class="empty-state-icon">📄</div><h3>No documents uploaded</h3>
    </div></div>`;

  const byRound = {};
  app.documents.forEach(d => {
    (byRound[d.submissionRound] = byRound[d.submissionRound] || []).push(d);
  });

  return Object.entries(byRound).sort(([a],[b]) => b-a).map(([round, docs]) => `
    <div class="card ${parseInt(round) > 1 ? 'mt-4' : ''}">
      <div class="card-header">
        <div class="card-title">Round #${round} Documents</div>
        ${round == app.submissionRound ? '<span class="badge badge-blue">Latest</span>' : ''}
      </div>
      <div class="card-body" style="padding:12px 16px">
        <div class="file-list">
          ${docs.map(d => `
            <div class="file-item">
              <span>📄</span>
              <span class="file-item-name">${escHtml(d.originalFileName)}</span>
              ${d.documentCategory ? `<span class="comment-section">${escHtml(d.documentCategory)}</span>` : ''}
              <span class="file-item-size">${fmtBytes(d.fileSizeBytes)}</span>
              ${aiVerificationBadge(d.aiVerificationStatus)}
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function renderHistoryTab(app) {
  return `
    <div class="card">
      <div class="card-header"><div class="card-title">Application History</div></div>
      <div class="card-body">
        <div class="timeline">
          ${app.statusHistory.map(h => `
            <div class="timeline-item">
              <div class="timeline-status">
                ${h.fromStatusLabel
                  ? `${escHtml(h.fromStatusLabel)} → <strong>${escHtml(h.toStatusLabel)}</strong>`
                  : `<strong>${escHtml(h.toStatusLabel)}</strong>`}
              </div>
              <div class="timeline-meta">${fmtDate(h.changedAt)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

// ── UC3: Flagged checklist items ─────────────────────────────────
function renderChecklistTab(app) {
  return `
    <div class="card">
      <div class="card-header">
        <div class="card-title">Items Requiring Clarification</div>
        <span class="badge badge-red" id="flagged-count">Loading…</span>
      </div>
      <div class="card-body" id="checklist-body">
        <div class="loading-overlay"><span class="spinner"></span></div>
      </div>
    </div>
  `;
}

async function loadFlaggedItems() {
  try {
    const items = await api.getFlaggedItems(appId);
    document.getElementById('flagged-count').textContent = `${items.length} flagged`;
    document.getElementById('checklist-body').innerHTML = items.length
      ? renderFlaggedItems(items)
      : '<div class="empty-state"><h3>No flagged items</h3><p>No items require your response at this time.</p></div>';
  } catch (err) {
    document.getElementById('checklist-body').innerHTML =
      `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

function renderFlaggedItems(items) {
  return `
    <div class="alert alert-info mb-6">
      <div class="alert-title">Please respond to each flagged item</div>
      The officer has flagged specific items from the site inspection for your clarification.
      Respond to each item below with supporting information.
    </div>
    <div class="checklist">
      ${items.map(item => renderFlaggedItem(item)).join('')}
    </div>
  `;
}

function renderFlaggedItem(item) {
  const hasResponse = item.operatorResponse;
  return `
    <div class="checklist-item ${hasResponse ? 'resolved' : 'flagged'}" id="flagged-${item.id}">
      <div class="checklist-header" onclick="toggleFlagged(${item.id})">
        <span class="checklist-code">${escHtml(item.itemCode)}</span>
        <span class="checklist-title">${escHtml(item.itemTitle)}</span>
        <div style="display:flex;gap:8px;align-items:center">
          ${hasResponse
            ? '<span class="badge badge-green">Response submitted</span>'
            : '<span class="badge badge-red">Response required</span>'}
          <span>▾</span>
        </div>
      </div>
      <div class="checklist-body" id="flagged-body-${item.id}">
        <div class="alert alert-warning mb-4">
          <div class="alert-title">Officer's Comment</div>
          ${escHtml(item.officerComment || '—')}
        </div>

        ${item.clarificationThreads && item.clarificationThreads.length ? `
          <div class="section-divider">Previous Clarifications</div>
          <div class="comment-list mb-4">
            ${item.clarificationThreads.map(t => `
              <div class="comment-item">
                <div class="comment-meta">
                  <span class="comment-author">${escHtml(t.authorName)}</span>
                  <span class="comment-section">Round ${t.clarificationRound}</span>
                  <span class="comment-date">${fmtDate(t.createdAt)}</span>
                </div>
                <div class="comment-text">${escHtml(t.message)}</div>
              </div>
            `).join('')}
          </div>
        ` : ''}

        <div class="form-group">
          <label>Your Response <span class="required">*</span></label>
          <textarea id="resp-${item.id}" rows="4"
                    placeholder="Provide clarification or supporting explanation…">${escHtml(item.operatorResponse || '')}</textarea>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
          <button class="btn btn-primary btn-sm" onclick="submitResponse(${item.id})">
            Submit Response
          </button>
        </div>
      </div>
    </div>
  `;
}

function toggleFlagged(id) {
  const body = document.getElementById(`flagged-body-${id}`);
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
}

async function submitResponse(itemId) {
  const message = document.getElementById(`resp-${itemId}`).value.trim();
  if (!message) { toast('Please enter a response', 'error'); return; }
  try {
    await api.respondToItem(itemId, { message });
    toast('Response submitted');
    const card = document.getElementById(`flagged-${itemId}`);
    card.className = 'checklist-item resolved';
  } catch (err) {
    toast(err.message, 'error');
  }
}

// ── Resubmit Modal ────────────────────────────────────────────────
function openResubmit() {
  rsFiles = [];
  document.getElementById('rs-file-list').innerHTML = '';
  document.getElementById('resubmit-modal').classList.remove('hidden');
  // Init dropzone
  const dz = document.getElementById('rs-dropzone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); onRsFileSelect(e.dataTransfer.files); });
}

function closeResubmit() {
  document.getElementById('resubmit-modal').classList.add('hidden');
}

function onRsFileSelect(files) {
  Array.from(files).forEach(file => rsFiles.push({ file, category: 'other' }));
  document.getElementById('rs-file-list').innerHTML = rsFiles.map((f, i) => `
    <div class="file-item">
      <span>📄</span>
      <span class="file-item-name">${escHtml(f.file.name)}</span>
      <span class="file-item-size">${fmtBytes(f.file.size)}</span>
      <button class="file-remove" onclick="rsFiles.splice(${i},1);onRsFileSelect([])">✕</button>
    </div>
  `).join('');
}

async function doResubmit() {
  const payload = {};
  const bn = document.getElementById('rs-businessName').value.trim();
  const ba = document.getElementById('rs-businessAddress').value.trim();
  const ph = document.getElementById('rs-contactPhone').value.trim();
  const ad = document.getElementById('rs-activityDescription').value.trim();
  if (bn) payload.businessName = bn;
  if (ba) payload.businessAddress = ba;
  if (ph) payload.contactPhone = ph;
  if (ad) payload.activityDescription = ad;

  const btn = document.getElementById('rs-submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Submitting…';

  try {
    app = await api.resubmit(appId, payload);
    closeResubmit();
    toast('Resubmission received. The officer has been notified.');
    renderPage(app);
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Submit Resubmission';
  }
}

document.getElementById('resubmit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeResubmit();
});
</script>
</body>
</html>
