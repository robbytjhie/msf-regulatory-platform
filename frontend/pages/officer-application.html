<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Review — Regulatory Platform</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Application Review</div>
      <div class="topbar-breadcrumb">
        <span style="cursor:pointer" onclick="window.location.href='/pages/officer-dashboard.html'">Dashboard</span>
        › <span id="breadcrumb-ref">…</span>
      </div>
    </header>

    <main class="page-content">
      <div id="page-body">
        <div class="loading-overlay"><span class="spinner"></span></div>
      </div>
    </main>
  </div>
</div>

<!-- Feedback Modal -->
<div class="modal-backdrop hidden" id="feedback-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Submit Officer Feedback</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="new-status">New Application Status <span class="required">*</span></label>
        <select id="new-status" class="status-select">
          <option value="">— Select a status —</option>
        </select>
      </div>
      <div class="form-group">
        <label for="status-notes">Internal Notes</label>
        <textarea id="status-notes" placeholder="Notes for the audit trail (not shown to operator)…" rows="2"></textarea>
      </div>

      <div class="section-divider" style="margin-top:20px">Feedback Comments</div>
      <p class="hint">Comments are linked to a form section and shown to the operator.</p>

      <div id="comments-list" style="display:flex;flex-direction:column;gap:10px;"></div>

      <button class="btn btn-secondary btn-sm mt-4" onclick="addComment()">＋ Add comment</button>

      <!-- Comment template picker -->
      <div class="form-group mt-4">
        <label>Quick templates</label>
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${COMMENT_TEMPLATES ? '' : ''}
        </div>
      </div>
      <div id="template-list" style="display:flex;flex-direction:column;gap:6px;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="submit-feedback-btn" onclick="submitFeedback()">
        Submit &amp; Notify Operator
      </button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/logger.js"></script>
<script>
const user = requireAuth('OFFICER');
const appId = new URLSearchParams(location.search).get('id');
let app = null;
let commentCount = 0;

if (!appId) window.location.href = '/pages/officer-dashboard.html';
if (user) init();

async function init() {
  document.getElementById('sidebar').innerHTML = renderSidebar(user, 'applications');
  try {
    app = await api.getApplication(appId);
    document.getElementById('breadcrumb-ref').textContent = app.referenceNumber;
    document.getElementById('topbar-title').textContent = app.businessName;
    renderPage(app);
  } catch (err) {
    document.getElementById('page-body').innerHTML =
      `<div class="alert alert-error"><div class="alert-title">Error</div>${escHtml(err.message)}</div>`;
  }
}

function renderPage(app) {
  const isResubmitted = ['PRE_SITE_RESUBMITTED','POST_SITE_CLARIFICATION_RESUBMITTED']
    .includes(app.internalStatus);
  const canAddFeedback = !['APPROVED','REJECTED'].includes(app.internalStatus);
  const hasSiteVisit = ['SITE_VISIT_SCHEDULED','SITE_VISIT_DONE','AWAITING_POST_SITE_CLARIFICATION',
    'PENDING_POST_SITE_RESUBMISSION','POST_SITE_CLARIFICATION_RESUBMITTED','PENDING_APPROVAL',
    'APPROVED','REJECTED'].includes(app.internalStatus);

  document.getElementById('page-body').innerHTML = `
    <!-- Header actions -->
    <div class="flex-between mb-6">
      <div>
        <div class="flex-center gap-3 mb-2">
          <span class="ref-num">${escHtml(app.referenceNumber)}</span>
          ${statusBadge(app.statusLabel)}
          ${isResubmitted ? '<span style="font-size:11px;color:var(--c-accent);font-weight:700;background:var(--c-accent-light);padding:3px 8px;border-radius:100px;">● UPDATED</span>' : ''}
        </div>
        <div class="text-muted text-sm">
          Round #${app.submissionRound} · Submitted by ${escHtml(app.operatorName)}
          · Last updated ${fmtDate(app.lastModifiedAt)}
        </div>
      </div>
      <div class="flex gap-3">
        ${hasSiteVisit ? `<button class="btn btn-secondary" onclick="window.location.href='/pages/officer-checklist.html?id=${app.id}'">🔍 Site Checklist</button>` : ''}
        ${canAddFeedback ? `<button class="btn btn-primary" onclick="openModal()">✉ Feedback & Status</button>` : ''}
      </div>
    </div>

    <!-- Unresolved officer comments banner -->
    ${renderUnresolvedBanner(app)}

    <!-- Tabs -->
    <div class="tabs" id="detail-tabs">
      <div class="tab active" data-tab="details">Application Details</div>
      <div class="tab" data-tab="documents">Documents (${app.documents.length})</div>
      <div class="tab" data-tab="comments">Comments (${app.officerComments.length})</div>
      <div class="tab" data-tab="history">Status History</div>
    </div>

    <div id="tab-content"></div>
  `;

  // Tab switching
  const tabs = { details: renderDetailsTab, documents: renderDocsTab,
                 comments: renderCommentsTab, history: renderHistoryTab };
  document.querySelectorAll('.tab[data-tab]').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab[data-tab]').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-content').innerHTML = tabs[tab.dataset.tab](app);
    });
  });
  document.getElementById('tab-content').innerHTML = renderDetailsTab(app);
}

function renderUnresolvedBanner(app) {
  const unresolved = app.officerComments.filter(c => !c.resolved);
  if (!unresolved.length) return '';
  return `<div class="alert alert-warning mb-6">
    <div class="alert-title">⚠ ${unresolved.length} unresolved comment${unresolved.length > 1 ? 's' : ''} from previous round</div>
    These issues have not yet been addressed by the operator.
  </div>`;
}

function renderDetailsTab(app) {
  return `
    <div class="card">
      <div class="card-header"><div class="card-title">Business Information</div></div>
      <div class="detail-grid">
        ${detailRow('Business Name', app.businessName)}
        ${detailRow('Business Type', app.businessType)}
        ${detailRow('Business Address', app.businessAddress)}
        ${detailRow('Contact Phone', app.contactPhone)}
        ${detailRow('Operator', `${app.operatorName} &lt;${app.operatorEmail}&gt;`)}
        ${detailRow('Assigned Officer', app.assignedOfficerName || '—')}
        ${detailRow('Submission Round', '#' + app.submissionRound)}
        ${detailRow('Submitted', fmtDate(app.submittedAt))}
      </div>
    </div>
    <div class="card mt-6">
      <div class="card-header"><div class="card-title">Activity Description</div></div>
      <div class="card-body">
        <p style="line-height:1.7;white-space:pre-wrap">${escHtml(app.activityDescription)}</p>
      </div>
    </div>
  `;
}

function renderDocsTab(app) {
  if (!app.documents.length) return `
    <div class="card"><div class="empty-state">
      <div class="empty-state-icon">📄</div>
      <h3>No documents uploaded</h3>
    </div></div>`;

  // Group by submission round
  const byRound = {};
  app.documents.forEach(d => {
    (byRound[d.submissionRound] = byRound[d.submissionRound] || []).push(d);
  });

  return Object.entries(byRound).sort(([a],[b]) => b-a).map(([round, docs]) => `
    <div class="card ${round > 1 ? 'mt-4' : ''}">
      <div class="card-header">
        <div class="card-title">Round #${round} Documents</div>
        ${round == app.submissionRound ? '<span class="badge badge-blue">Latest</span>' : ''}
      </div>
      <div class="card-body" style="padding:12px 16px">
        <div class="file-list">
          ${docs.map(d => `
            <div class="file-item">
              <span>📄</span>
              <span class="file-item-name">${escHtml(d.originalFileName)}</span>
              ${d.documentCategory ? `<span class="comment-section">${escHtml(d.documentCategory)}</span>` : ''}
              <span class="file-item-size">${fmtBytes(d.fileSizeBytes)}</span>
              ${aiVerificationBadge(d.aiVerificationStatus)}
              ${d.aiVerificationNotes ? `<span title="${escHtml(d.aiVerificationNotes)}" style="cursor:help;font-size:12px">ℹ</span>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function renderCommentsTab(app) {
  if (!app.officerComments.length) return `
    <div class="card"><div class="empty-state">
      <div class="empty-state-icon">💬</div>
      <h3>No comments yet</h3>
      <p>Submit feedback to add comments.</p>
    </div></div>`;

  const byRound = {};
  app.officerComments.forEach(c => {
    (byRound[c.submissionRound] = byRound[c.submissionRound] || []).push(c);
  });

  return Object.entries(byRound).sort(([a],[b]) => b-a).map(([round, comments]) => `
    <div class="card ${round > 1 ? 'mt-4' : ''}">
      <div class="card-header">
        <div class="card-title">Round #${round} Feedback</div>
      </div>
      <div class="card-body">
        <div class="comment-list">
          ${comments.map(c => `
            <div class="comment-item ${c.resolved ? 'resolved' : 'unresolved'}">
              <div class="comment-meta">
                <span class="comment-author">${escHtml(c.officerName)}</span>
                ${c.targetSection ? `<span class="comment-section">${escHtml(c.targetSection)}</span>` : ''}
                ${c.resolved ? '<span class="badge badge-green" style="font-size:10px">Resolved</span>' : '<span class="badge badge-red" style="font-size:10px">Open</span>'}
                <span class="comment-date">${fmtDate(c.createdAt)}</span>
              </div>
              <div class="comment-text">${escHtml(c.commentText)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function renderHistoryTab(app) {
  return `
    <div class="card">
      <div class="card-header"><div class="card-title">Status History</div></div>
      <div class="card-body">
        <div class="timeline">
          ${app.statusHistory.map(h => `
            <div class="timeline-item">
              <div class="timeline-status">
                ${h.fromStatusLabel
                  ? `${escHtml(h.fromStatusLabel)} → ${escHtml(h.toStatusLabel)}`
                  : escHtml(h.toStatusLabel)}
              </div>
              <div class="timeline-meta">
                ${escHtml(h.changedByName)} · ${fmtDate(h.changedAt)}
                ${h.notes ? ` · <em>${escHtml(h.notes)}</em>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function detailRow(label, value) {
  return `
    <div class="detail-row">
      <div class="detail-label">${escHtml(label)}</div>
      <div class="detail-value">${value}</div>
    </div>`;
}

// ── Feedback Modal ────────────────────────────────────────────────
function openModal() {
  commentCount = 0;
  document.getElementById('comments-list').innerHTML = '';
  document.getElementById('status-notes').value = '';

  const sel = document.getElementById('new-status');
  sel.innerHTML = '<option value="">— Select a status —</option>' +
    OFFICER_STATUS_OPTIONS.map(o =>
      `<option value="${o.value}">${escHtml(o.label)}</option>`
    ).join('');

  // Render comment templates
  document.getElementById('template-list').innerHTML = COMMENT_TEMPLATES.map((t, i) => `
    <button class="btn btn-ghost btn-sm" style="text-align:left;height:auto;padding:6px 10px;"
            onclick="addCommentWithText(${JSON.stringify(t)})">
      ＋ ${escHtml(t.substring(0, 70))}…
    </button>
  `).join('');

  document.getElementById('feedback-modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('feedback-modal').classList.add('hidden');
}

function addComment(prefill = '') {
  commentCount++;
  const id = `comment-${commentCount}`;
  const div = document.createElement('div');
  div.id = id;
  div.style.cssText = 'border:1px solid var(--c-border);border-radius:6px;padding:12px;';
  div.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <select class="comment-section-sel" style="flex:1;padding:6px 8px;font-size:12.5px">
        <option value="">General comment</option>
        <option value="business_registration">Business Registration</option>
        <option value="site_plan">Site Plan</option>
        <option value="fire_safety">Fire Safety</option>
        <option value="food_hygiene">Food Hygiene</option>
        <option value="documents">Documents</option>
        <option value="activity_description">Activity Description</option>
      </select>
      <button onclick="document.getElementById('${id}').remove()"
              style="background:none;border:none;cursor:pointer;color:var(--c-text-muted);font-size:16px;">✕</button>
    </div>
    <textarea class="comment-text-area" rows="3" placeholder="Enter comment for operator…"
              style="width:100%">${escHtml(prefill)}</textarea>
  `;
  document.getElementById('comments-list').appendChild(div);
}

function addCommentWithText(text) {
  addComment(text);
}

async function submitFeedback() {
  const newStatus = document.getElementById('new-status').value;
  if (!newStatus) { toast('Please select a new status', 'error'); return; }

  const comments = [];
  document.querySelectorAll('#comments-list > div').forEach(div => {
    const text = div.querySelector('.comment-text-area').value.trim();
    const section = div.querySelector('.comment-section-sel').value;
    if (text) comments.push({ commentText: text, targetSection: section || null });
  });

  const btn = document.getElementById('submit-feedback-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Submitting…';

  try {
    app = await api.submitFeedback(appId, {
      newStatus,
      statusNotes: document.getElementById('status-notes').value.trim() || null,
      comments,
    });
    closeModal();
    toast('Feedback submitted. Operator has been notified.');
    renderPage(app);
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Submit & Notify Operator';
  }
}

// Close modal on backdrop click
document.getElementById('feedback-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
